version: "3.9"

services:
  api:
    build: .
    container_name: cpg-api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data       # persist SQLite DB across restarts
      - ./mlruns:/app/mlruns   # persist MLflow run history
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard:
    build: .
    container_name: cpg-dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      - API_BASE=http://api:8000   # talk to the API service, not localhost
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
